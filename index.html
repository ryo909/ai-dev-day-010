<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day010 — API Error Narrator</title>
  <meta name="description" content="API障害の初動切り分けを1分で始めるためのログ整理ツール。（話題:HN Frontpage）">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-badge">Day010</div>
      <h1 class="header-title">API Error Narrator</h1>
      <p class="header-desc">API障害の初動切り分けを1分で始めるためのログ整理ツール。（話題:HN Frontpage）</p>
    </header>
    <main class="app-main">
      <section class="tool-area">
        <div class="input-group">
          <label for="toolInput" class="input-label">エラーログ</label>
          <textarea id="toolInput" class="input-textarea" rows="6" placeholder="2026-03-08T12:00Z ERROR payment timeout status=504"></textarea>
        </div>
        <button id="actionBtn" class="btn-primary">切り分ける</button>
        <div class="output-group" id="outputGroup" style="display:none">
          <label class="input-label">初動切り分け</label>
          <div id="toolOutput" class="output-area"></div>
        </div>
      </section>
    </main>
    <footer class="app-footer">
      <span>Day010 — 障害調査の最初の10分を短縮</span>
      <a href="https://github.com/ryo909/ai-dev-day-010" target="_blank" rel="noopener">GitHub</a>
    </footer>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
